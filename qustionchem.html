<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chemistry Quiz Page</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
    }

    .container{
      width: 80%;
      max-width: 700px;
      margin: 50px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    h1{
      text-align: center;
      color: #333;
    }

    .question{
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #222;
    }

    .options{
      margin-top: 15px;
    }

    .options button{
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      background: #f1f1f1;
      cursor: pointer;
      font-size: 16px;
      transition: 0.3s;
    }

    .options button:hover{
      background: #4facfe;
      color: white;
    }

    #result{
      margin-top: 20px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    .next-btn{
      margin-top: 20px;
      padding: 12px 20px;
      background: #00c853;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: none;
      font-size: 16px;
    }

    .next-btn:hover{
      background: #009624;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Chemistry Quiz</h1>

<div class="score" id="scoreBox">
      Score: 0
    </div>

    <div id="question"></div>

    <div id="answers"></div>

    <div id="result"></div>

    <div id="quiz">
      <div class="question" id="question"></div>

      <div class="options" id="options"></div>

      <div id="result"></div>

      <button class="next-btn" id="nextBtn">Next Question</button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: "What is the chemical symbol for Gold?",
        options: ["Ag", "Au", "Gd", "Go"],
        answer: "Au"
      },

      {
        question: "What is the pH value of pure water?",
        options: ["5", "6", "7", "8"],
        answer: "7"
      },

      {
        question: "Which gas is used in photosynthesis?",
        options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"],
        answer: "Carbon Dioxide"
      },

      {
        question: "H2O is the chemical formula for?",
        options: ["Hydrogen", "Salt", "Water", "Oxygen"],
        answer: "Water"
      },

      {
        question: "Which acid is found in lemons?",
        options: ["Sulfuric acid", "Citric acid", "Nitric acid", "Hydrochloric acid"],
        answer: "Citric acid"
      }
    ];

    let currentQuestion = 0;
    let score = 0;

    const questionEl = document.getElementById("question");
    const optionsEl = document.getElementById("options");
    const resultEl = document.getElementById("result");
    const nextBtn = document.getElementById("nextBtn");

    function loadQuestion() {
      resultEl.innerHTML = "";
      nextBtn.style.display = "none";

      const currentQuiz = quizData[currentQuestion];

      questionEl.innerHTML = currentQuiz.question;

      optionsEl.innerHTML = "";

      currentQuiz.options.forEach(option => {
        const button = document.createElement("button");
        button.innerText = option;

        button.addEventListener("click", () => checkAnswer(option));

        optionsEl.appendChild(button);
      });
    }

    function checkAnswer(selected) {
      const correctAnswer = quizData[currentQuestion].answer;

      if(selected === correctAnswer){
        resultEl.innerHTML = "✅ Correct!";
        resultEl.style.color = "green";
        score++;
      } else {
        resultEl.innerHTML = "❌ Wrong! Correct answer: " + correctAnswer;
        resultEl.style.color = "red";
      }

      nextBtn.style.display = "block";
    }

    nextBtn.addEventListener("click", () => {
      currentQuestion++;

      if(currentQuestion < quizData.length){
        loadQuestion();
      } else {
        showFinalScore();
      }
    });

    function showFinalScore(){
      questionEl.innerHTML = "Quiz Completed!";
      optionsEl.innerHTML = "";
      resultEl.innerHTML = "🎉 Your Score: " + score + " / " + quizData.length;
      nextBtn.style.display = "none";
    }

    loadQuestion();
  </script>

</body>
</html>
